name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Apply
        env:
          A35B06: ${{ secrets.A35B06 }}
          B0EDDD: ${{ secrets.B0EDDD }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A35B06', ''), os.environ.get('B0EDDD', '')
          total = 0
          for html in pathlib.Path('_site').rglob('*.html'):
              try:
                  text = html.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              patched = text
              if a:
                  patched = patched.replace('<!-- 41877d434fb6207d89 -->', a)
              if b:
                  patched = patched.replace('<!-- e739f8f8bff9e024f11fbdb0fe50f97b12c7 -->', b)
              if patched != text:
                  html.write_text(patched, encoding='utf-8')
                  total += 1
          if total == 0 and (a or b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
